{{ define "main" }}
<div class="sec" style="padding-top:80px">
  <div class="sec-head">
    <div>
      <div class="sec-tag">📂 {{ .Title }}</div>
      <div class="sec-title">{{ .Title }}（{{ len .Pages }} 篇文章）</div>
    </div>
    <a href="/" class="sec-more">← 返回首页</a>
  </div>
  <div class="art-list">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="art-row">
      <div class="art-row-left">
        <span class="art-row-tag feat-tag {{ .Params.tag_color | default "blue" }}">{{ .Params.tag_label | default .Section }}</span>
        <h4>{{ .Title }}</h4>
        <div class="art-row-hint">{{ .Params.excerpt | default (.Summary | truncate 80) }}</div>
      </div>
      <div class="art-row-right"><span class="art-row-date">{{ .Date.Format "2006-01-02" }}</span></div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
