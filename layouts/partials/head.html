<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="msvalidate.01" content="58B8BC3B56964E4B68D451072143B15E">
<title>{{ if .IsHome }}{{ printf "%s | %s" (site.Params.description | truncate 60) site.Title }}{{ else }}{{ printf "%s - %s" .Title site.Title }}{{ end }}</title>
{{ if .IsHome }}
<meta name="description" content="{{ site.Params.description }}">
{{ else if .Params.description }}
<meta name="description" content="{{ .Params.description }}">
{{ else }}
<meta name="description" content="{{ .Summary | plainify | truncate 160 }}">
{{ end }}
<meta name="keywords" content="{{ with .Params.keywords }}{{ . }}{{ else }}{{ site.Params.keywords }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ site.Title }}">
{{ if .Params.og_image }}<meta property="og:image" content="{{ .Params.og_image | absURL }}">{{ else }}{{ if .Params.images }}<meta property="og:image" content="{{ index .Params.images 0 | absURL }}">{{ else }}<meta property="og:image" content="{{ site.Params.ogimage | absURL }}">{{ end }}{{ end }}
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="/css/style.css">
