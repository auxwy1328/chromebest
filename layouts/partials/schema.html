{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "ChromeBest",
  "url": "https://chromebest.com/",
  "description": "Chrome插件推荐、浏览器技巧教程与下载",
  "inLanguage": "zh-CN"
}
</script>
{{ end }}

{{ if and (not .IsHome) (not .IsNode) }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "首页",
      "item": "https://chromebest.com/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .CurrentSection.Title }}",
      "item": "{{ .CurrentSection.Permalink }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}"
    }
  ]
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Params.description }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "author": {
    "@type": "Organization",
    "name": "ChromeBest"
  },
  "publisher": {
    "@type": "Organization",
    "name": "ChromeBest",
    "logo": {
      "@type": "ImageObject",
      "url": "https://chromebest.com/og-default.jpg"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
}
</script>
{{ with .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $item := . }}{{ if $i }},{{ end }}{
      "@type": "Question",
      "name": "{{ $item.q }}",
      "acceptedAnswer": { "@type": "Answer", "text": "{{ $item.a }}" }
    }{{ end }}
  ]
}
</script>
{{ end }}
{{ end }}

{{ if .IsNode }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "首页",
      "item": "https://chromebest.com/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}"
    }
  ]
}
</script>
{{ end }}
